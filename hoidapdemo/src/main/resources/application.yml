server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

spring:
  datasource:
    url: jdbc:${DATABASE_ENGINE:mysql}://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:hoidap}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "1"

  logging:
    level:
      org.springframework.web: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:rAgzHyLsdnzkWnajRDtbRXJx3w75tWjtqgNZTQ2sjPY}
    expire-minutes: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:30}